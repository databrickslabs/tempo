name: docs-release

on:
  push:
    branches: ['master']
    paths:
      - 'docs/**'  # Trigger when files inside docs folder are changed
    tags:
      - 'v*' # only release a versioned tag, such as v.X.Y.Z
  pull_request:
    paths:
      - 'docs/**'  # Trigger when docs are changed within a pull request
  workflow_dispatch:  # Allow manual triggering of the workflow

# Least-privilege default: read-only unless a job needs more.
permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      # Required to publish the built documentation to the gh-pages branch.
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '8'

      - name: Setup uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1
        with:
          version: "0.11.2"
          checksum: "7ac2ca0449c8d68dae9b99e635cd3bc9b22a4cb1de64b7c43716398447d42981"  # uv-x86_64-unknown-linux-gnu.tar.gz

      - name: Build docs
        working-directory: ./python
        run: make build-docs

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: html-docs
          path: docs/_build/html/

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e  # v4.0.0
        # Deploy to the gh-pages branch when a tag is pushed or the workflow is manually triggered
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          # GITHUB_TOKEN is auto-injected; scoped to this deploy step only.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
