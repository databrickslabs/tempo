name: Release

on:
  workflow_dispatch:  # Allow manual triggering of the workflow


jobs:
  publish:
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    # if: ${{ github.ref_name == 'main' }}
    environment: release
    permissions:
      # Used to authenticate to PyPI via OIDC and sign the release's artifacts with sigstore-python.
      id-token: write
      # Used to attach signing artifacts to the published release.
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1
        with:
          version: "0.11.2"
          checksum: "7ac2ca0449c8d68dae9b99e635cd3bc9b22a4cb1de64b7c43716398447d42981"  # uv-x86_64-unknown-linux-gnu.tar.gz

      # This job runs on an IT-managed runner, which is blocked from the public
      # PyPI and developer proxies; route package installs through JFrog.
      - name: Setup for JFrog
        uses: ./.github/actions/jfrog-auth

      - name: Setup development environment
        working-directory: ./python
        run: make setup

      - name: Build dist
        working-directory: ./python
        run: make build-dist

      - name: Create tag
        id: create_tag
        working-directory: ./python
        run: |
          # Extract version from version.py
          VERSION=$(uv run --no-default-groups python -c "exec(open('version.py').read()); print(__version__)")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Creating tag v${VERSION}"

          # Check if tag already exists
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping tag creation"
          else
            git tag -a "v${VERSION}" -m "Release version ${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Draft release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          tag_name: v${{ steps.create_tag.outputs.VERSION }}
          draft: true
          files: |
            python/dist/dbl_tempo*.whl
            python/dist/tempo*.whl

      - name: Publish a Python distribution to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          packages-dir: python/dist/

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@a5caf349bc536fbef3668a10ed7f5cd309a4b53d  # v3.2.0
        with:
          inputs: |
            python/dist/dbl_tempo*.whl
            python/dist/tempo*.whl
          release-signing-artifacts: true
