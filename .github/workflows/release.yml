name: Release

on:
  workflow_dispatch:  # Allow manual triggering of the workflow


jobs:
  publish:
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    # if: ${{ github.ref_name == 'main' }}
    environment: release
    permissions:
      # Used to authenticate to PyPI via OIDC and sign the release's artifacts with sigstore-python.
      id-token: write
      # Used to attach signing artifacts to the published release.
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'

      - name: Setup development tools
        working-directory: ./python
        run: make setup

      - name: Build dist
        working-directory: ./python
        run: make build-dist

      - name: Create tag
        id: create_tag
        run: |
          # Extract version from version.py
          VERSION=$(python -c "exec(open('./python/version.py').read()); print(__version__)")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Creating tag v${VERSION}"

          # Check if tag already exists
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping tag creation"
          else
            git tag -a "v${VERSION}" -m "Release version ${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Draft release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          tag_name: v${{ steps.create_tag.outputs.VERSION }}
          draft: true
          files: |
            python/dist/dbl_tempo*.whl
            python/dist/tempo*.whl

      - name: Publish a Python distribution to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          packages-dir: python/dist/

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@a5caf349bc536fbef3668a10ed7f5cd309a4b53d  # v3.2.0
        with:
          inputs: |
            python/dist/dbl_tempo*.whl
            python/dist/tempo*.whl
          release-signing-artifacts: true
